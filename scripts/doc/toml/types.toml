[LVColor]
allowed_values = "Hexadecimal or RGB values (e.g. '#FF0000', '0xFF0000', 'rgb(255, 0, 0)')."

[LVCoord]
allowed_values = "Pixel or percentage values (e.g. '10', '10%')."

