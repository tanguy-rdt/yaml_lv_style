[LVAlign]
allowed_values = [
    { name = "LV_ALIGN_DEFAULT",           alias = "default"           },
    { name = "LV_ALIGN_TOP_LEFT",          alias = "top_left"          },
    { name = "LV_ALIGN_TOP_MID",           alias = "top_mid"           },
    { name = "LV_ALIGN_TOP_RIGHT",         alias = "top_right"         },
    { name = "LV_ALIGN_BOTTOM_LEFT",       alias = "bottom_left"       },
    { name = "LV_ALIGN_BOTTOM_MID",        alias = "bottom_mid"        },
    { name = "LV_ALIGN_BOTTOM_RIGHT",      alias = "bottom_right"      },
    { name = "LV_ALIGN_LEFT_MID",          alias = "left_mid"          },
    { name = "LV_ALIGN_RIGHT_MID",         alias = "right_mid"         },
    { name = "LV_ALIGN_CENTER",            alias = "center"            },
    { name = "LV_ALIGN_OUT_TOP_LEFT",      alias = "out_top_left"      },
    { name = "LV_ALIGN_OUT_TOP_MID",       alias = "out_top_mid"       },
    { name = "LV_ALIGN_OUT_TOP_RIGHT",     alias = "out_top_right"     },
    { name = "LV_ALIGN_OUT_BOTTOM_LEFT",   alias = "out_bottom_left"   },
    { name = "LV_ALIGN_OUT_BOTTOM_MID",    alias = "out_bottom_mid"    },
    { name = "LV_ALIGN_OUT_BOTTOM_RIGHT",  alias = "out_bottom_right"  },
    { name = "LV_ALIGN_OUT_LEFT_TOP",      alias = "out_left_top"      },
    { name = "LV_ALIGN_OUT_LEFT_MID",      alias = "out_left_mid"      },
    { name = "LV_ALIGN_OUT_LEFT_BOTTOM",   alias = "out_left_bottom"   },
    { name = "LV_ALIGN_OUT_RIGHT_TOP",     alias = "out_right_top"     },
    { name = "LV_ALIGN_OUT_RIGHT_MID",     alias = "out_right_mid"     },
    { name = "LV_ALIGN_OUT_RIGHT_BOTTOM",  alias = "out_right_bottom"  },
]

