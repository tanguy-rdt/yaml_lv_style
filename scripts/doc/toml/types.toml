[LVGridDscArray]
allowed_values = "An array of pixel and/or fractional values."
example = """
grid_column_dsc_array: [10px, 1fr, 2fr]
"""

[LVImageColorkey]
allowed_values = "A color range defined by a low and high LVColor bound."
example = """
image_colorkey:
  low: "#000000"
  high: "#0F0F0F"
# or inline
image_colorkey: { low: "#000000", high: "#0F0F0F" }
"""

