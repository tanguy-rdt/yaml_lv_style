# ==============================================================================
# Background
# ==============================================================================

[background]
desc = "Properties to describe the background color and image of Widget."

[background.bg_color]
desc = "Set background color of Widget."
allowed_values = "LVColor"
default = "0xffffff"
inherited = false
layout = false
ext_draw = false

[background.bg_opa]
desc = "Set opacity of the background."
allowed_values = "LVOpa"
default = "LV_OPA_TRANSP"
inherited = false
layout = false
ext_draw = false

[background.bg_grad_color]
desc = "Set gradient color of the background. Used only if bg_grad_dir is not LV_GRAD_DIR_NONE."
allowed_values = "LVColor"
default = "0x000000"
inherited = false
layout = false
ext_draw = false

[background.bg_grad_dir]
desc = "Set direction of the gradient of the background."
allowed_values = "LVGradDir"
default = "LV_GRAD_DIR_NONE"
inherited = false
layout = false
ext_draw = false

[background.bg_main_stop]
desc = "Set point from which background color should start for gradients."
allowed_values = "Integer values between 0 and 255. 0 means top/left side, 255 the bottom/right side, 128 the center."
default = "0"
inherited = false
layout = false
ext_draw = false

[background.bg_grad_stop]
desc = "Set point from which background's gradient color should start."
allowed_values = "Integer values between 0 and 255. 0 means top/left side, 255 the bottom/right side, 128 the center."
default = "255"
inherited = false
layout = false
ext_draw = false

[background.bg_main_opa]
desc = "Set opacity of the first gradient color."
allowed_values = "LVOpa"
default = "LV_OPA_COVER"
inherited = false
layout = false
ext_draw = false

[background.bg_grad_opa]
desc = "Set opacity of the second gradient color."
allowed_values = "LVOpa"
default = "LV_OPA_COVER"
inherited = false
layout = false
ext_draw = false

[background.bg_grad]
note_important = "Not yet implemented"
desc = "Set gradient definition. Wraps bg_grad_color, bg_grad_dir, bg_main_stop and bg_grad_stop into one descriptor and allows gradients with more colors. If set, other gradient related properties are ignored."
default = "NULL"
inherited = false
layout = false
ext_draw = false

[background.bg_image_src]
note_important = "Not yet implemented"
desc = "Set a background image. Can be a pointer to lv_image_dsc_t, a path to a file or an LV_SYMBOL_..."
default = "NULL"
inherited = false
layout = false
ext_draw = true

[background.bg_image_opa]
desc = "Set opacity of the background image."
allowed_values = "LVOpa"
default = "LV_OPA_COVER"
inherited = false
layout = false
ext_draw = false

[background.bg_image_recolor]
desc = "Set a color to mix to the background image."
allowed_values = "LVColor"
default = "0x000000"
inherited = false
layout = false
ext_draw = false

[background.bg_image_recolor_opa]
desc = "Set intensity of background image recoloring."
allowed_values = "LVOpa"
default = "LV_OPA_TRANSP"
inherited = false
layout = false
ext_draw = false

[background.bg_image_tiled]
desc = "If enabled the background image will be tiled."
allowed_values = "true, false"
default = "false"
inherited = false
layout = false
ext_draw = false

