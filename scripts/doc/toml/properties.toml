default = "0"
inherited = false
layout = true
ext_draw = false

[padding.pad_bottom]
desc = "Sets the padding on the bottom. It makes the content area smaller in this direction."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = true
ext_draw = false

[padding.pad_left]
desc = "Sets the padding on the left. It makes the content area smaller in this direction."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = true
ext_draw = false

[padding.pad_right]
desc = "Sets the padding on the right. It makes the content area smaller in this direction."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = true
ext_draw = false

[padding.pad_row]
desc = "Sets the padding between the rows. Used by the layouts."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = true
ext_draw = false

[padding.pad_column]
desc = "Sets the padding between the columns. Used by the layouts."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = true
ext_draw = false

[padding.pad_radial]
desc = "Pad text labels away from the scale ticks or remainder of the LV_PART_."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = false
ext_draw = false

