# LVGL Style Properties

# ==============================================================================
# Size and Position
# ==============================================================================

[size_and_position]
desc = "Properties related to size, position, alignment and layout of Widgets."

[size_and_position.width]
desc = "Sets width of Widget."
allowed_values = "LVSize"
note_info = "Percentage values are relative to the width of the parent's content area."
default = "Widget dependent"
inherited = false
layout = true
ext_draw = false

[size_and_position.min_width]
desc = "Sets a minimal width."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to the width of the parent's content area."
default = "0"
inherited = false
layout = true
ext_draw = false

[size_and_position.max_width]
desc = "Sets a maximal width."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to the width of the parent's content area."
default = "LV_COORD_MAX"
inherited = false
layout = true
ext_draw = false

[size_and_position.height]
desc = "Sets height of Widget."
allowed_values = "LVSize"
note_info = "Percentage values are relative to the height of the parent's content area."
default = "Widget dependent"
inherited = false
layout = true
ext_draw = false

[size_and_position.min_height]
desc = "Sets a minimal height."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to the height of the parent's content area."
default = "0"
inherited = false
layout = true
ext_draw = false

[size_and_position.max_height]
desc = "Sets a maximal height."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to the height of the parent's content area."
default = "LV_COORD_MAX"
inherited = false
layout = true
ext_draw = false

[size_and_position.x]
desc = "Set X coordinate of Widget considering the align setting."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to the width of the parent's content area."
default = "0"
inherited = false
layout = true
ext_draw = false

[size_and_position.y]
desc = "Set Y coordinate of Widget considering the align setting."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to the height of the parent's content area."
default = "0"
inherited = false
layout = true
ext_draw = false

[size_and_position.align]
desc = "Set the alignment which tells from which point of the parent the X and Y coordinates should be interpreted."
allowed_values = "LVAlign"
default = "LV_ALIGN_DEFAULT"
inherited = false
layout = true
ext_draw = false

[size_and_position.length]
desc = "Its meaning depends on the type of Widget. For example in case of lv_scale it means the length of the ticks."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = false
ext_draw = true

[size_and_position.transform_width]
desc = "Make Widget wider on both sides with this value."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to Widget's width."
default = "0"
inherited = false
layout = false
ext_draw = true

[size_and_position.transform_height]
desc = "Make Widget higher on both sides with this value."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to Widget's height."
default = "0"
inherited = false
layout = false
ext_draw = true

[size_and_position.transform_scale_x]
desc = "Zoom Widget horizontally."
allowed_values = "Integer values. 256 means normal size, 128 half size, 512 double size, and so on."
default = "256"
inherited = false
layout = true
ext_draw = true

[size_and_position.transform_scale_y]
desc = "Zoom Widget vertically."
allowed_values = "Integer values. 256 means normal size, 128 half size, 512 double size, and so on."
default = "256"
inherited = false
layout = true
ext_draw = true

[size_and_position.transform_rotation]
desc = "Rotate Widget."
allowed_values = "Integer values in 0.1 degree units (e.g. '450' means 45 deg)."
default = "0"
inherited = false
layout = true
ext_draw = true

[size_and_position.transform_pivot_x]
desc = "Set pivot point's X coordinate for transformations. Relative to Widget's top left corner."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = false
ext_draw = false

[size_and_position.transform_pivot_y]
desc = "Set pivot point's Y coordinate for transformations. Relative to Widget's top left corner."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = false
ext_draw = false

[size_and_position.transform_skew_x]
desc = "Skew Widget horizontally."
allowed_values = "Integer values in 0.1 degree units (e.g. '450' means 45 deg)."
default = "0"
inherited = false
layout = true
ext_draw = true

[size_and_position.transform_skew_y]
desc = "Skew Widget vertically."
allowed_values = "Integer values in 0.1 degree units (e.g. '450' means 45 deg)."
default = "0"
inherited = false
layout = true
ext_draw = true

[size_and_position.translate_x]
desc = "Move Widget with this value in X direction. Applied after layouts, aligns and other positioning."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to Widget's width."
default = "0"
inherited = false
layout = true
ext_draw = false

[size_and_position.translate_y]
desc = "Move Widget with this value in Y direction. Applied after layouts, aligns and other positioning."
allowed_values = "LVCoord"
note_info = "Percentage values are relative to Widget's height."
default = "0"
inherited = false
layout = true
ext_draw = false

[size_and_position.translate_radial]
desc = "Move object around the centre of the parent object, e.g. around the circumference of a scale."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = true
ext_draw = false

[size_and_position.radial_offset]
desc = "Move start point of object (e.g. scale tick) radially."
allowed_values = "Pixel values (e.g. '10')."
default = "0"
inherited = false
layout = false
ext_draw = false

