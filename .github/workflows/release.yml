name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master

jobs:
  build-and-release:
    name: Build and Release for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            dpkg_arch: amd64
            use_cross: true
            artifact_name: yaml_lv_style
            asset_name: yaml_lv_style-linux-x86_64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            dpkg_arch: arm64
            use_cross: true
            artifact_name: yaml_lv_style
            asset_name: yaml_lv_style-linux-arm64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            dpkg_arch: arm64
            use_cross: false
            artifact_name: yaml_lv_style
            asset_name: yaml_lv_style-macos-arm64.tar.gz

    env:
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Set version
        id: version
        run: |
          if [ "${{ env.IS_RELEASE }}" = "true" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=nightly-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
            echo "TAG_NAME=nightly" >> $GITHUB_OUTPUT
          fi

      - name: Create archive
        run: |
          STAGING="${{ matrix.artifact_name }}"
          COPYRIGHT_DIR="${STAGING}/copyright"
          CMAKE_DIR="${STAGING}/cmake"
          
          mkdir -p "${COPYRIGHT_DIR}"
          mkdir -p "${CMAKE_DIR}"
          
          cp "target/${{ matrix.target }}/release/yaml_lv_style" "${STAGING}/"
          
          [ -f LICENSE-MIT ] && cp LICENSE-MIT "${COPYRIGHT_DIR}/"
          [ -f LICENSE-APACHE ] && cp LICENSE-APACHE "${COPYRIGHT_DIR}/"
          [ -f NOTICE ] && cp NOTICE "${COPYRIGHT_DIR}/"
          [ -f cmake/FindYamlLvStyle.cmake ] && cp cmake/FindYamlLvStyle.cmake "${CMAKE_DIR}/"
          [ -f cmake/YamlLvStyleMacros.cmake ] && cp cmake/YamlLvStyleMacros.cmake "${CMAKE_DIR}/"
          
          tar -czf "${{ matrix.asset_name }}" "${STAGING}"

      - name: Create Debian Package
        if: startsWith(matrix.os, 'ubuntu') && env.IS_RELEASE == 'true'
        run: |
          COPYRIGHT_YEARS="2026 - $(date "+%Y")"
          VERSION=${{ steps.version.outputs.VERSION }}
          DPKG_DIR="target/debian"
          DOC_DIR="${DPKG_DIR}/usr/share/doc/yaml_lv_style"
          
          rm -rf "${DPKG_DIR}"
          mkdir -p "${DPKG_DIR}/usr/bin"
          mkdir -p "${DPKG_DIR}/DEBIAN"
          mkdir -p "${DOC_DIR}"

          cp "target/${{ matrix.target }}/release/yaml_lv_style" "${DPKG_DIR}/usr/bin/"
          chmod 755 "${DPKG_DIR}/usr/bin/yaml_lv_style"
          
          [ -f LICENSE-APACHE ] && cp LICENSE-APACHE "${DOC_DIR}/"
          [ -f LICENSE-MIT ] && cp LICENSE-MIT "${DOC_DIR}/"
          [ -f NOTICE ] && cp NOTICE "${DOC_DIR}/"
          
          cat > "${DOC_DIR}/copyright" <<EOF
          Format: http://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
          Upstream-Name: yaml_lv_style
          Source: https://github.com/tanguy-rdt/yaml_lv_style
          
          Files: *
          Copyright: ${COPYRIGHT_YEARS} tanguy-rdt
          License: Apache-2.0 or MIT
          
          License: Apache-2.0
            On Debian systems, the complete text of the Apache-2.0 can be found in the
            file /usr/share/common-licenses/Apache-2.0.
          
          License: MIT
            Permission is hereby granted, free of charge, to any person obtaining a copy
            of this software and associated documentation files (the "Software"), to deal
            in the Software without restriction, including without limitation the rights
            to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
            copies of the Software, and to permit persons to whom the Software is
            furnished to do so, subject to the following conditions:
            .
            The above copyright notice and this permission notice shall be included in all
            copies or substantial portions of the Software.
            .
            THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
            IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
            FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
            AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
            LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
            OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
            SOFTWARE.
          EOF
          chmod 644 "${DOC_DIR}/copyright"
            
          cat > "${DPKG_DIR}/DEBIAN/control" <<EOF
          Package: yaml-lv-style
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.dpkg_arch }}
          Maintainer: tanguy-rdt <tanguy@roudaut.dev>
          Homepage: https://github.com/tanguy-rdt/yaml_lv_style
          Description: Tool to generate LVGL C++ styles from YAML files.
            Allows easy management of LVGL styles using a clean YAML syntax.
          EOF
            
          fakeroot dpkg-deb --build "${DPKG_DIR}" "yaml_lv_style_${VERSION}_${{ matrix.dpkg_arch }}.deb"

      - name: Update Nightly Tag
        if: env.IS_RELEASE != 'true'
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: ${{ env.IS_RELEASE == 'true' && steps.version.outputs.TAG_NAME || 'Development Build (Nightly)' }}
          prerelease: ${{ env.IS_RELEASE != 'true' }}
          files: |
            ${{ matrix.asset_name }}
            ${{ env.IS_RELEASE == 'true' && '*.deb' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}