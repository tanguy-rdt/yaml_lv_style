const_style:
  - const: true
  - default:
      outline_width: 1
      outline_color: rgb(0, 0, 0)
      outline_opa: LV_OPA_COVER
      outline_pad: 2

dyn_style:
  - const: false
  - default:
      outline_width: 1
      outline_color: rgb(0, 0, 0)
      outline_opa: LV_OPA_COVER
      outline_pad: 2
