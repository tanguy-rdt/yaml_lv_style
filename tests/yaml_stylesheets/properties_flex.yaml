const_style:
  - const: true
  - default:
        flex_flow: LV_FLEX_FLOW_ROW
        flex_main_place: LV_FLEX_ALIGN_START
        flex_cross_place: LV_FLEX_ALIGN_END
        flex_track_place: LV_FLEX_ALIGN_SPACE_EVENLY
        flex_grow: 1

dyn_style:
  - const: false
  - default:
        flex_flow: row
        flex_main_place: start
        flex_cross_place: end
        flex_track_place: space_evenly
        flex_grow: 1
