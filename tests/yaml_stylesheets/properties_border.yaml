const_style:
  - const: true
  - default:
      border_color: hex(0xff0000)
      border_opa: LV_OPA_COVER
      border_width: 1
      border_side: LV_BORDER_SIDE_TOP
      border_post: true

dyn_style:
  - const: false
  - default:
      border_color: hex(0xff0000)
      border_opa: cover
      border_width: 1
      border_side: top
      border_post: true