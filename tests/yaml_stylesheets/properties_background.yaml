const_style:
  - const: true
  - default:
      bg_color: hex(0xff0000)
      bg_opa: LV_OPA_COVER
      bg_grad_color: rgb(0, 0, 0)
      bg_grad_dir: LV_GRAD_DIR_VER
      bg_main_stop: 2
      bg_grad_stop: 2
      bg_main_opa: LV_OPA_TRANSP
      bg_grad_opa: LV_OPA_40
#      bg_grad: not_yet_implemented
#      bg_image_src: not_yet_implemented
      bg_image_opa: LV_OPA_40
      bg_image_recolor: rgb(0, 0, 0)
      bg_image_recolor_opa: opa_40
      bg_image_tiled: true

dyn_style:
  - const: false
  - default:
      bg_color: hex(0xff0000)
      bg_opa: cover
      bg_grad_color: rgb(0, 0, 0)
      bg_grad_dir: vertical
      bg_main_stop: 2
      bg_grad_stop: 2
      bg_main_opa: transparent
      bg_grad_opa: opa_40
#      bg_grad: not_yet_implemented
#      bg_image_src: not_yet_implemented
      bg_image_opa: opa_40
      bg_image_recolor: rgb(0, 0, 0)
      bg_image_recolor_opa: opa_40
      bg_image_tiled: false