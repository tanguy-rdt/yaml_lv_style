const_style:
  - const: true
  - default:
        line_width: 1
        line_dash_width: 2
        line_dash_gap: 3
        line_rounded: true
        line_color: hex(0xff0000)
        line_opa: LV_OPA_COVER

dyn_style:
  - const: false
  - default:
        line_width: 1
        line_dash_width: 2
        line_dash_gap: 3
        line_rounded: true
        line_color: hex(0xff0000)
        line_opa: LV_OPA_COVER