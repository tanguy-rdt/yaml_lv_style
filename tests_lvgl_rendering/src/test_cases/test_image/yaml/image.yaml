styles:
  - name: test_image_opa
    const: @CONST_STYLE@
    default:
      image_opa: cover
    user_1:
      image_opa: opa_50
    user_2:
      image_opa: transparent

  - name: test_image_recolor
    const: @CONST_STYLE@
    default:
      image_recolor: "#FF0000"
      image_recolor_opa: transparent
    user_1:
      image_recolor: "#00FF00"
      image_recolor_opa: opa_50
    user_2:
      image_recolor: "#0000FF"
      image_recolor_opa: cover

  - name: test_image_colorkey
    const: @CONST_STYLE@
    default:
      image_colorkey:
        low: "#000000"
        high: "#FFFFFF"
    user_1:
      image_colorkey:
        low: "#000000"
        high: "#55ff66"