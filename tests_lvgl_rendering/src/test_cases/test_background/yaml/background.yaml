styles:
  - name: test_bg_color
    const: @CONST_STYLE@
    default:
      bg_color: "#FF0000"
      bg_opa: cover
    user_1:
      bg_color: "#00FF00"
      bg_opa: opa_50
    user_2:
      bg_color: "#0000FF"
      bg_opa: transparent

  - name: test_bg_grad
    const: @CONST_STYLE@
    default:
      bg_color: "#FF0000"
      bg_grad_color: "#0000FF"
      bg_grad_dir: horizontal
      bg_main_stop: 0
      bg_grad_stop: 255
      bg_main_opa: cover
      bg_grad_opa: cover
    user_1:
      bg_grad_dir: vertical
      bg_main_stop: 64
      bg_grad_stop: 192
    user_2:
      bg_grad_dir: none

  - name: test_bg_image
    const: @CONST_STYLE@
    default:
      bg_image_opa: cover
      bg_image_recolor: "#FF0000"
      bg_image_recolor_opa: transparent
      bg_image_tiled: false
    user_1:
      bg_image_opa: opa_50
      bg_image_recolor_opa: opa_50
      bg_image_tiled: true